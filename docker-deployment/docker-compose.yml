services:
  arbeitszeitapp:
    image: ${ARBEITSZEITAPP_IMAGE:-arbeitszeitapp:latest}
    environment:
      FLASK_APP: arbeitszeit_flask.wsgi:app
      ARBEITSZEITAPP_CONFIGURATION_PATH: /app/arbeitszeitapp.cfg
      MPLCONFIGDIR: /app
      MAIL_CONFIG_PATH: /app/mailconfig.json
      SERVER_NAME: ${SERVER_NAME:-localhost}
      SERVER_TYPE: ${SERVER_TYPE:-flask}
      # Database connection configuration
      POSTGRES_USER: ${POSTGRES_USER:-arbeitszeitapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-examplepassword}
      POSTGRES_DB: ${POSTGRES_DB:-arbeitszeitapp}
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - arbeitszeitapp-data:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf.template:/etc/nginx/nginx-template.conf:ro
    environment:
      - SERVER_NAME=${SERVER_NAME:-localhost}
      - SSL_ENABLED=false
    command: >
      sh -c "
      export SSL_REDIRECT_START='#' &&
      export SSL_REDIRECT_END='#' &&
      export HTTP_LOCATION_START='' &&
      export HTTP_LOCATION_END='' &&
      export SSL_SERVER_START='#' &&
      export SSL_SERVER_END='#' &&
      envsubst '$$SERVER_NAME $$SSL_REDIRECT_START $$SSL_REDIRECT_END $$HTTP_LOCATION_START $$HTTP_LOCATION_END $$SSL_SERVER_START $$SSL_SERVER_END' < /etc/nginx/nginx-template.conf > /etc/nginx/nginx.conf && 
      nginx -g 'daemon off;'"
    depends_on:
      - arbeitszeitapp
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-arbeitszeitapp}
      POSTGRES_USER: ${POSTGRES_USER:-arbeitszeitapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-examplepassword}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arbeitszeitapp"]
      interval: 30s
      timeout: 10s
      retries: 5
volumes:
  arbeitszeitapp-data:
  postgres-data:
