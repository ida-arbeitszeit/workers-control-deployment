services:
  arbeitszeitapp:
    image: ${ARBEITSZEITAPP_IMAGE:-arbeitszeitapp:latest}
    environment:
      FLASK_APP: arbeitszeit_flask.wsgi:app
      ARBEITSZEITAPP_CONFIGURATION_PATH: /app/arbeitszeitapp.cfg
      MPLCONFIGDIR: /app
      MAIL_CONFIG_PATH: /app/mailconfig.json
      SERVER_NAME: ${SERVER_NAME}
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - arbeitszeitapp-data:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - arbeitszeitapp
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arbeitszeitapp"]
      interval: 30s
      timeout: 10s
      retries: 5
volumes:
  arbeitszeitapp-data:
  postgres-data:
