services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf.template:/etc/nginx/nginx-template.conf:ro
      - ./certs:/etc/nginx/certs:ro
    environment:
      - SERVER_NAME=${SERVER_NAME:-localhost}
      - SSL_ENABLED=true
    command: >
      sh -c "
      export SSL_REDIRECT_START='' &&
      export SSL_REDIRECT_END='' &&
      export HTTP_LOCATION_START='#' &&
      export HTTP_LOCATION_END='#' &&
      export SSL_SERVER_START='' &&
      export SSL_SERVER_END='' &&
      envsubst '$$SERVER_NAME $$SSL_REDIRECT_START $$SSL_REDIRECT_END $$HTTP_LOCATION_START $$HTTP_LOCATION_END $$SSL_SERVER_START $$SSL_SERVER_END' < /etc/nginx/nginx-template.conf > /etc/nginx/nginx.conf && 
      nginx -g 'daemon off;'"
    depends_on:
      - arbeitszeitapp
  arbeitszeitapp:
    image: arbeitszeitapp:latest
    environment:
      FLASK_APP: arbeitszeit_flask.wsgi:app
      ARBEITSZEITAPP_CONFIGURATION_PATH: /app/arbeitszeitapp.cfg
      MPLCONFIGDIR: /app
      MAIL_CONFIG_PATH: /app/mailconfig.json
      PROFILING_CONFIG_PATH: /app/profiling.json
      # Ensure to set this environment variables in your .env file or directly in the environment"}"
      # Database connection configuration
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db/${POSTGRES_DB}
      SERVER_NAME: ${SERVER_NAME}
      SERVER_TYPE: ${SERVER_TYPE:-flask}
      MAIL_SERVER: ${MAIL_SERVER:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_DEFAULT_SENDER: ${MAIL_DEFAULT_SENDER:-}
      MAIL_USE_TLS: ${MAIL_USE_TLS:-true}
      MAIL_USE_SSL: ${MAIL_USE_SSL:-false}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - arbeitszeitapp-data:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arbeitszeitapp"]
      interval: 30s
      timeout: 10s
      retries: 5
volumes:
  arbeitszeitapp-data:
  postgres-data:
