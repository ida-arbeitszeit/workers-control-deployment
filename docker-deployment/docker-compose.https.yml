services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-https.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - arbeitszeitapp
  arbeitszeitapp:
    image: arbeitszeitapp:latest
    environment:
      FLASK_APP: arbeitszeit_flask.wsgi:app
      ARBEITSZEITAPP_CONFIGURATION_PATH: /app/arbeitszeitapp.cfg
      MPLCONFIGDIR: /app
      MAIL_CONFIG_PATH: /app/mailconfig.json
      # Ensure to set this environment variables in your .env file or directly in the environment"}"
      DATABASE_URL: ${DATABASE_URL}
      SERVER_NAME: ${SERVER_NAME}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ../mailconfig.json:/app/mailconfig.json:ro
      - arbeitszeitapp-data:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arbeitszeitapp"]
      interval: 30s
      timeout: 10s
      retries: 5
volumes:
  arbeitszeitapp-data:
  postgres-data:
