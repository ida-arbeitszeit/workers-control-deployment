services:
  arbeitszeitapp:
    environment:
      DATABASE_URL: ${DATABASE_URL:-}
      SERVER_NAME: ${SERVER_NAME:-localhost}
      PROFILING_ENABLED: ${PROFILING_ENABLED:-false}
      PROFILING_AUTH_ENABLED: ${PROFILING_AUTH_ENABLED:-false}
      PROFILING_USERNAME: ${PROFILING_USERNAME:-}
      PROFILING_PASSWORD: ${PROFILING_PASSWORD:-}
      PROFILING_ENDPOINT: ${PROFILING_ENDPOINT:-profiling}
      MAIL_SERVER: ${MAIL_SERVER:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_DEFAULT_SENDER: ${MAIL_DEFAULT_SENDER:-}
      MAIL_USE_TLS: ${MAIL_USE_TLS:-true}
      MAIL_USE_SSL: ${MAIL_USE_SSL:-false}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
  db:
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arbeitszeitapp"]
      interval: 10s
      timeout: 5s
      retries: 5
